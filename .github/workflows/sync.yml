name: Sync Google Sheets → words.json

# cron は15分ごと＋手動実行。※public リポジトリの schedule は
# 60日間コミットが無いと自動停止する仕様のため、実行のたびに
# 自身を re-enable するAPIを叩いてカウンタをリセットする（手動対応不要）。
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-google-sheets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SYNC_DEPLOY_KEY }}

      - name: 60日無活動による自動停止を防ぐ（セルフ再有効化）
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/sync.yml/enable"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Googleスプレッドシートを同期
        env:
          GOOGLE_SHEETS_ID: 1yrRhWC3SZ2KMcfYV2VkMpAahDJQKSeAE5EOHvGmcgv4
        run: node scripts/sync-sheets.mjs

      - name: 差分があればコミット
        run: |
          if [ -n "$(git status --porcelain data/words.json data/kobun.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/words.json data/kobun.json
            git commit -m "data: Google Sheets同期でwords.jsonを更新"
            git push
          else
            echo "変化なし。コミットしません。"
          fi
