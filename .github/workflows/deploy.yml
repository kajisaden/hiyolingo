name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # 同期がリポジトリ直下 data/ のみ更新した場合はアプリ再ビルド不要（M3以降で効く）。
    # アプリは data/words.json を runtime 取得するため、データ更新でデプロイは走らせない。
    paths-ignore:
      - 'data/**'
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1本に絞る（進行中のデプロイはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000 # 30分。既定10分だと障害時の遅延デプロイで落ちるため延長
