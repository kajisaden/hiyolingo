<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>hiyolingo — 単語帳</title>
    <link rel="icon" type="image/svg+xml" href="/hiyolingo/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/hiyolingo/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/hiyolingo/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/hiyolingo/apple-touch-icon.png" />
    <link rel="manifest" href="/hiyolingo/manifest.webmanifest" />
    <meta name="theme-color" content="#4C6EF5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="hiyolingo" />
    <script>
      // 描画前にテーマを適用（ちらつき防止）。設定は 自動/ライト/ダーク。
      (function () {
        try {
          var v = localStorage.getItem('hiyolingo-theme')
          var pref = v === 'light' || v === 'dark' ? v : 'auto'
          var dark =
            pref === 'dark' ||
            (pref === 'auto' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          var el = document.documentElement
          el.classList.toggle('dark', dark)
          el.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
